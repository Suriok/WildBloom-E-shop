<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildBloom - Flower Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center py-4">
            <h1 class="text-2xl font-bold text-green-600">WildBloom 🌸</h1>
            <div class="flex gap-4">
                <a href="login.html" class="text-gray-700 hover:text-green-600 font-medium py-2">Login</a>
                <a href="register.html" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">Register</a>
            </div>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
        <div class="relative">
            <input
                    type="text"
                    id="searchInput"
                    placeholder="Search for flowers..."
                    class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
            >
            <svg class="absolute left-4 top-3.5 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
        </div>
    </div>

    <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <p class="text-gray-500 col-span-full text-center">Loading flowers...</p>
    </div>
</main>

<script>

    function createProductCard(product) {

        const description = product.description ? product.description : '';

        return `
            <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow">
                <div class="h-48 bg-green-100 flex items-center justify-center">
                   <span class="text-green-600 text-4xl">🌺</span>
                </div>
                <div class="p-4">
                    <h3 class="text-lg font-semibold text-gray-800 mb-2">${product.name}</h3>
                    <p class="text-gray-500 text-sm mb-2 h-10 overflow-hidden">${description}</p>
                    <div class="flex justify-between items-center mt-4">
                         <p class="text-green-600 font-bold text-xl">${product.price} CZK</p>
                         <button class="text-sm bg-green-50 text-green-700 px-3 py-1 rounded hover:bg-green-100">Add to Cart</button>
                    </div>
                </div>
            </div>
        `;
    }


    fetch('/api/products')
        .then(response => {
            if (!response.ok) throw new Error("Failed to load");
            return response.json();
        })
        .then(data => {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = '<p class="text-center col-span-full">No flowers found in database.</p>';
                return;
            }

            data.forEach(product => {
                grid.innerHTML += createProductCard(product);
            });
        })
        .catch(err => {
            console.error(err);
            document.getElementById('productsGrid').innerHTML =
                '<p class="text-red-500 text-center col-span-full">Error loading products. Is the server running?</p>';
        });

    // 2. Логика поиска (Бонус: теперь работает поиск!)
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') {
            const query = searchInput.value;
            // Используем ваш API поиска: /api/products/search?name=...
            fetch('/wildbloom/api/products/search?name=${query}')
                .then(res => res.json())
                .then(data => {
                    const grid = document.getElementById('productsGrid');
                    grid.innerHTML = '';
                    if (data.length === 0) {
                        grid.innerHTML = '<p class="text-center col-span-full">No flowers match your search.</p>';
                    } else {
                        data.forEach(p => grid.innerHTML += createProductCard(p));
                    }
                });
        }
    });
</script>

</body>
</html>
