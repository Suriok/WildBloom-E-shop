<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WildBloom - My Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<header class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center py-4">
            <a href="/" class="text-2xl font-bold text-green-600">WildBloom 🌸</a>
            <div class="flex gap-4 items-center">
                <a href="/cart.html" class="text-gray-700 hover:text-green-600 font-medium py-2">Cart</a>
                <form method="post" action="/logout">
                    <button class="text-gray-700 hover:text-green-600 font-medium py-2" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-2xl font-bold text-gray-900">My Orders</h1>

    <div id="msg" class="hidden mt-4 rounded-lg px-4 py-3 text-sm"></div>

    <div id="orders" class="mt-6 space-y-4">
        <div class="text-gray-500">Loading...</div>
    </div>
</main>

<script>
    const msg = document.getElementById('msg');
    const ordersEl = document.getElementById('orders');

    function showMsg(text, ok=true) {
        msg.className = "mt-4 rounded-lg px-4 py-3 text-sm " +
            (ok ? "bg-green-50 text-green-700 border border-green-200" : "bg-red-50 text-red-700 border border-red-200");
        msg.textContent = text;
        msg.classList.remove('hidden');
    }

    function canCancel(status) {
        return status === "WAITING_FOR_CONFIRMATION" || status === "CONFIRMED";
    }

    function badge(status) {
        const base = "inline-flex items-center px-2 py-1 rounded-full text-xs font-semibold ";
        switch (status) {
            case "WAITING_FOR_CONFIRMATION": return base + "bg-yellow-50 text-yellow-700 border border-yellow-200";
            case "CONFIRMED": return base + "bg-blue-50 text-blue-700 border border-blue-200";
            case "IN_TRANSIT": return base + "bg-purple-50 text-purple-700 border border-purple-200";
            case "DELIVERED": return base + "bg-green-50 text-green-700 border border-green-200";
            case "CANCELLED": return base + "bg-gray-100 text-gray-700 border border-gray-200";
            default: return base + "bg-gray-100 text-gray-700 border border-gray-200";
        }
    }

    async function fetchJson(url, options) {
        const res = await fetch(url, options);
        const ct = (res.headers.get('content-type') || '');
        // если нас редиректнуло на login.html, json не будет
        if (!ct.includes('application/json')) {
            window.location.href = "/login.html";
            return null;
        }
        if (!res.ok) {
            const t = await res.text();
            throw new Error(t || res.status);
        }
        return await res.json();
    }

    async function loadOrders() {
        msg.classList.add('hidden');
        ordersEl.innerHTML = `<div class="text-gray-500">Loading...</div>`;

        try {
            const list = await fetchJson('/api/orders/my');
            if (!list) return;

            if (list.length === 0) {
                ordersEl.innerHTML = `<div class="text-gray-500">You have no orders yet.</div>`;
                return;
            }

            ordersEl.innerHTML = list.map(o => `
        <div class="bg-white rounded-2xl shadow p-5" id="order-${o.orderId}">
          <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <div>
              <div class="text-lg font-semibold text-gray-900">Order #${o.orderId}</div>
              <div class="text-sm text-gray-600 mt-1">
                <span class="${badge(o.status)}">${o.status}</span>
                <span class="ml-2">Date: ${o.date ? new Date(o.date).toLocaleString() : "-"}</span>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <div class="text-right">
                <div class="text-sm text-gray-600">Total</div>
                <div class="text-xl font-bold text-green-700">${o.totalAmount ?? 0} CZK</div>
              </div>
              <button class="px-3 py-2 rounded-lg border hover:bg-gray-50"
                      onclick="toggleDetails(${o.orderId})">
                Details
              </button>
              ${canCancel(o.status) ? `
                <button class="px-3 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700"
                        onclick="cancelOrder(${o.orderId})">
                  Cancel
                </button>
              ` : ``}
            </div>
          </div>

          <div class="mt-4 hidden" id="details-${o.orderId}">
            <div class="text-gray-500 text-sm">Loading details...</div>
          </div>
        </div>
      `).join('');

        } catch (e) {
            ordersEl.innerHTML = `<div class="text-red-600">Error: ${e.message}</div>`;
        }
    }

    async function toggleDetails(orderId) {
        const box = document.getElementById(`details-${orderId}`);
        if (box.classList.contains('hidden')) {
            box.classList.remove('hidden');

            // если уже загружено — просто показываем
            if (box.dataset.loaded === "1") return;

            try {
                const detail = await fetchJson(`/api/orders/${orderId}`);
                if (!detail) return;

                const items = detail.items || [];
                if (items.length === 0) {
                    box.innerHTML = `<div class="text-gray-500 text-sm">No items.</div>`;
                } else {
                    box.innerHTML = `
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="text-left text-gray-500">
                    <th class="py-2">Product</th>
                    <th class="py-2">Qty</th>
                    <th class="py-2">Price</th>
                    <th class="py-2">Line total</th>
                  </tr>
                </thead>
                <tbody>
                  ${items.map(it => `
                    <tr class="border-t">
                      <td class="py-2">${it.name}</td>
                      <td class="py-2">${it.amount}</td>
                      <td class="py-2">${it.price} CZK</td>
                      <td class="py-2 font-semibold">${it.lineTotal} CZK</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          `;
                }
                box.dataset.loaded = "1";
            } catch (e) {
                box.innerHTML = `<div class="text-red-600 text-sm">Error: ${e.message}</div>`;
            }
        } else {
            box.classList.add('hidden');
        }
    }

    async function cancelOrder(orderId) {
        msg.classList.add('hidden');
        if (!confirm(`Cancel order #${orderId}?`)) return;

        try {
            const res = await fetch(`/api/orders/${orderId}/cancel`, { method: 'POST' });
            const ct = (res.headers.get('content-type') || '');
            if (!ct.includes('application/json') && !res.ok) {
                // возможно редирект на логин
                window.location.href = "/login.html";
                return;
            }
            if (!res.ok) {
                const t = await res.text();
                throw new Error(t || res.status);
            }

            showMsg(`Order #${orderId} cancelled.`);
            await loadOrders();
        } catch (e) {
            showMsg(`Cancel failed: ${e.message}`, false);
        }
    }

    // expose to window for onclick
    window.toggleDetails = toggleDetails;
    window.cancelOrder = cancelOrder;

    loadOrders();
</script>

</body>
</html>
