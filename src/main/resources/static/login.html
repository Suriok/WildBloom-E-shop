<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WildBloom - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">
<header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center py-4">
            <a href="./" class="text-2xl font-bold text-green-600">WildBloom 🌸</a>
            <div class="flex gap-4">
                <a href="register.html" class="text-gray-700 hover:text-green-600 font-medium py-2">Register</a>
            </div>
        </div>
    </div>
</header>

<main class="max-w-lg mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="bg-white rounded-2xl shadow p-8">
        <h2 class="text-2xl font-bold text-gray-900">Sign in</h2>
        <p class="text-gray-600 mt-1">Welcome back to WildBloom.</p>

        <div id="msg" class="hidden mt-4 rounded-lg px-4 py-3 text-sm"></div>

        <form class="mt-6 space-y-4" method="post" action="login">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <!-- Spring Security ожидает параметр name="username" -->
                <input name="username" type="email" required
                       class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"/>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input name="password" type="password" required
                       class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"/>
            </div>

            <button type="submit"
                    class="w-full rounded-lg bg-green-600 text-white font-semibold py-2 hover:bg-green-700 transition">
                Login
            </button>

            <p class="text-sm text-gray-600 text-center">
                Don’t have an account?
                <a href="register.html" class="text-green-600 hover:text-green-700 font-medium">Create one</a>
            </p>
        </form>
    </div>
</main>

<script>
    const msg = document.getElementById('msg');
    const p = new URLSearchParams(window.location.search);
    if (p.has('error')) {
        msg.className = "mt-4 rounded-lg px-4 py-3 text-sm bg-red-50 text-red-700 border border-red-200";
        msg.textContent = "Invalid credentials. Please try again.";
    }
    if (p.has('logout')) {
        msg.className = "mt-4 rounded-lg px-4 py-3 text-sm bg-green-50 text-green-700 border border-green-200";
        msg.textContent = "You have been logged out.";
    }
</script>
</body>
</html>
