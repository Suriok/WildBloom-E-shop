<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildBloom - Orders Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

<header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center py-4">
            <div class="flex items-center gap-2">
                <h1 class="text-2xl font-bold text-green-600 tracking-tight">WildBloom 🌸</h1>
                <span id="roleBadge" class="bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded-full uppercase font-semibold tracking-wide">Staff</span>
            </div>
            <form id="logoutForm" method="post" action="/logout">
                <button class="text-gray-700 hover:text-green-600 font-medium py-2">Logout</button>
            </form>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
    <div class="bg-white p-2 rounded-xl shadow-sm inline-flex gap-2 border border-gray-100">
        <a id="inventoryLink" href="admin.html" class="hidden px-6 py-2.5 rounded-lg text-gray-600 font-medium hover:bg-gray-50 transition-colors flex items-center gap-2">
            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            Inventory
        </a>
        <a href="orders-management.html" class="px-6 py-2.5 rounded-lg bg-green-600 text-white font-medium shadow-md flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            Orders Management
        </a>
    </div>
</div>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in">
    <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <div>
                <h2 class="text-xl font-bold text-gray-800">Customer Orders</h2>
                <p class="text-sm text-gray-500 mt-1">Track and manage incoming orders</p>
            </div>
            <button onclick="loadOrders()" class="bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm font-medium hover:border-green-500 hover:text-green-600 transition-all flex items-center gap-2 shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Refresh List
            </button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                <tr class="bg-green-50/50 text-gray-600 text-sm uppercase tracking-wider border-b border-green-100">
                    <th class="px-6 py-4 font-semibold">Order ID</th>
                    <th class="px-6 py-4 font-semibold">Date</th>
                    <th class="px-6 py-4 font-semibold">Customer</th>
                    <th class="px-6 py-4 font-semibold">Total Amount</th>
                    <th class="px-6 py-4 font-semibold">Status</th>
                    <th class="px-6 py-4 font-semibold text-right">Actions</th>
                </tr>
                </thead>
                <tbody id="ordersTableBody" class="divide-y divide-gray-100">
                </tbody>
            </table>
        </div>
    </div>

    <div id="detailsModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl p-6">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <h3 class="text-xl font-bold text-gray-900">Order Details</h3>
                    <p id="detailsHeader" class="text-sm text-gray-600 mt-1"></p>
                </div>
                <button onclick="closeDetails()" class="px-3 py-2 rounded-lg border border-red-200 text-red-700 bg-red-50 hover:bg-red-100 transition">Close</button>
            </div>
            <div id="detailsBody" class="mt-4 text-sm text-gray-700 font-mono bg-gray-50 p-4 rounded-xl">Loading details...</div>
        </div>
    </div>
</main>

<div id="messageBox" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-3 w-80 pointer-events-none">
</div>

<script>
    const NEXT = {
        "WAITING_FOR_CONFIRMATION": ["CONFIRMED", "CANCELLED"],
        "CONFIRMED": ["IN_TRANSIT", "CANCELLED"],
        "IN_TRANSIT": ["DELIVERED"],
        "DELIVERED": [],
        "CANCELLED": []
    };

    function statusPillClass(status) {
        switch (status) {
            case "WAITING_FOR_CONFIRMATION": return "bg-blue-100 text-blue-700";
            case "CONFIRMED": return "bg-yellow-100 text-yellow-800";
            case "IN_TRANSIT": return "bg-purple-100 text-purple-800";
            case "DELIVERED": return "bg-green-100 text-green-700";
            case "CANCELLED": return "bg-red-100 text-red-700";
            default: return "bg-gray-100 text-gray-600";
        }
    }

    function fmtMoney(v) {
        const n = Number(v);
        return Number.isFinite(n) ? n.toFixed(2) : (v ?? "0.00");
    }

    async function loadOrders() {
        const tbody = document.getElementById("ordersTableBody");
        try {
            const res = await fetch("/api/orders");
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const orders = await res.json();
            tbody.innerHTML = "";
            orders.forEach(order => {
                const statusClass = statusPillClass(order.status);
                const next = NEXT[order.status] || [];
                const canChange = next.length > 0;
                const options = `<option value="${order.status}" selected>${order.status}</option>` +
                    next.map(s => `<option value="${s}">${s}</option>`).join("");

                tbody.insertAdjacentHTML("beforeend", `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 font-medium text-gray-900">#${order.orderId}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">${new Date(order.date).toLocaleString()}</td>
                        <td class="px-6 py-4">
                            <div class="font-bold text-gray-900">${order.customerName}</div>
                            <div class="text-xs text-gray-500">${order.customerEmail}</div>
                        </td>
                        <td class="px-6 py-4 font-bold text-green-600">${fmtMoney(order.totalAmount)} CZK</td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-xs font-semibold ${statusClass}">${order.status}</span>
                            <div class="mt-2 flex gap-2">
                                <select id="st-${order.orderId}" class="text-xs border rounded-lg px-2 py-1" ${canChange ? "" : "disabled"}>${options}</select>
                                <button onclick="changeStatus(${order.orderId})" class="text-xs font-semibold px-2 py-1 rounded bg-white border border-gray-200 hover:border-green-500 transition" ${canChange ? "" : "disabled"}>Update</button>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="viewDetails(${order.orderId})" class="text-xs font-semibold bg-green-50 text-green-700 px-3 py-1.5 rounded-lg border border-green-200 hover:bg-green-100 transition">View Details</button>
                        </td>
                    </tr>
                `);
            });
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-red-500">Error: ${e.message}</td></tr>`;
        }
    }

    async function changeStatus(orderId) {
        const status = document.getElementById(`st-${orderId}`).value;
        try {
            const res = await fetch(`/api/orders/${orderId}/status?status=${encodeURIComponent(status)}`, { method: 'PATCH' });
            if (!res.ok) throw new Error(await res.text());
            await loadOrders();
        } catch (e) { alert("Action failed: " + e.message); }
    }

    async function viewDetails(orderId) {
        const modal = document.getElementById('detailsModal');
        const body = document.getElementById('detailsBody');
        modal.classList.remove('hidden');
        body.innerHTML = 'Loading order data...';
        try {
            const res = await fetch(`/api/orders/${orderId}/details`);
            const data = await res.json();
            document.getElementById('detailsHeader').textContent = `Order #${orderId} - Customer: ${data.order.customerName}`;
            body.innerHTML = `<pre class="whitespace-pre-wrap">${JSON.stringify(data.items, null, 2)}</pre>`;
        } catch (e) { body.innerHTML = "Error loading details: " + e.message; }
    }

    function closeDetails() { document.getElementById('detailsModal').classList.add('hidden'); }

    // WEBSOCKET NOTIFICATION LOGIC
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const socket = new WebSocket(`${protocol}//${window.location.host}/ws`);

    socket.onmessage = function(event) {
        const messageBox = document.getElementById('messageBox');
        let orderId = "Unknown";
        let status = "Updated";

        try {
            const data = JSON.parse(event.data);
            orderId = data.orderId;
            status = data.status;
        } catch(e) {
            console.error("Non-JSON message received:", event.data);
        }

        const toast = document.createElement('div');
        toast.className = "pointer-events-auto bg-white border-l-4 border-green-500 shadow-2xl rounded-xl p-4 flex items-start justify-between transform transition-all duration-500 translate-x-full opacity-0";
        toast.innerHTML = `
            <div class="flex-1">
                <p class="text-xs font-bold text-green-600 uppercase tracking-widest">Live Update</p>
                <p class="text-sm text-gray-700 mt-1">Order <strong>#${orderId}</strong> status changed to <span class="font-semibold">${status}</span></p>
            </div>
            <button onclick="this.parentElement.remove()" class="ml-4 text-gray-400 hover:text-gray-600 text-xl font-bold">&times;</button>
        `;

        messageBox.prepend(toast);

        // Animation entry
        setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);

        // Auto-remove after 10 seconds
        setTimeout(() => {
            toast.classList.add('opacity-0', 'translate-x-full');
            setTimeout(() => toast.remove(), 500);
        }, 10000);

        // Automatically refresh table
        if (typeof loadOrders === 'function') loadOrders();
    };

    socket.onopen = () => console.log('WebSocket Connected');
    socket.onclose = () => console.log('WebSocket Disconnected');

    // Initial Load
    loadOrders();

    // User Role Detection
    (async () => {
        try {
            const me = await (await fetch('/api/orders/whoami')).json();
            document.getElementById('roleBadge').textContent = me.role;
            if (me.role === 'ADMINISTRATOR') document.getElementById('inventoryLink').classList.remove('hidden');
        } catch(e) { console.error("Identity check failed"); }
    })();
</script>

</body>
</html>
