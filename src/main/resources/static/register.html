<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WildBloom - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-white rounded-xl shadow p-6">
        <h1 class="text-2xl font-bold text-green-600 mb-6">Create account</h1>

        <form id="regForm" class="space-y-3">
            <input id="name" class="w-full border rounded-lg px-3 py-2" placeholder="Name" required />
            <input id="email" type="email" class="w-full border rounded-lg px-3 py-2" placeholder="Email" required />
            <input id="password" type="password" class="w-full border rounded-lg px-3 py-2" placeholder="Password" required />
            <input id="phone" class="w-full border rounded-lg px-3 py-2" placeholder="Phone" />
            <input id="address" class="w-full border rounded-lg px-3 py-2" placeholder="Address" />

            <button class="w-full bg-green-600 text-white rounded-lg py-2 hover:bg-green-700">
                Register
            </button>

            <p id="msg" class="text-sm"></p>
            <a href="login" class="text-green-700 underline text-sm">Already have an account? Login</a>
        </form>
    </div>
</div>

<script>
    const form = document.getElementById('regForm');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.textContent = '';
        msg.className = 'text-sm';

        const payload = {
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
            phone: document.getElementById('phone').value.trim(),
            address: document.getElementById('address').value.trim()
        };

        try {
            // важно: относительный URL -> /wildbloom/auth/register
            const res = await fetch('auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                msg.textContent = 'Registered successfully. Redirecting to login...';
                msg.className = 'text-sm text-green-700';
                setTimeout(() => window.location.href = 'login', 800);
            } else {
                const text = await res.text();
                msg.textContent = 'Registration failed: ' + (text || res.status);
                msg.className = 'text-sm text-red-600';
            }
        } catch (err) {
            msg.textContent = 'Network error: ' + err;
            msg.className = 'text-sm text-red-600';
        }
    });
</script>

</body>
</html>
