<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildBloom - Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

<header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center py-4">
            <div class="flex items-center gap-2">
                <h1 class="text-2xl font-bold text-green-600">WildBloom 🌸</h1>
                <span class="bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded-full uppercase font-semibold tracking-wide">Admin</span>
            </div>

            <a href="index.html" class="text-gray-600 hover:text-green-600 font-medium transition-colors flex items-center gap-1">
                <span>Shop Home</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
            </a>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
    <div class="bg-white p-2 rounded-xl shadow-sm inline-flex gap-2 border border-gray-100">
        <a href="admin.html" class="px-6 py-2.5 rounded-lg bg-green-600 text-white font-medium shadow-md flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            Inventory (Add)
        </a>

        <a href="orders-management.html" class="px-6 py-2.5 rounded-lg text-gray-600 font-medium hover:bg-gray-50 transition-colors flex items-center gap-2">
            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            Orders Management
        </a>
    </div>
</div>

<main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in">

    <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden mb-8">
        <div class="px-6 py-4 border-b border-gray-100 bg-gray-50/50">
            <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                <span class="bg-green-100 text-green-600 w-8 h-8 rounded-full flex items-center justify-center text-sm">1</span>
                Add New Category
            </h2>
        </div>
        <div class="p-6">
            <form id="catForm" class="flex gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Category Name</label>
                    <input id="catName" type="text" placeholder="e.g. Orchids" required
                           class="w-full border border-gray-300 px-4 py-2.5 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all">
                </div>
                <div class="flex items-end">
                    <button type="submit" class="bg-green-600 text-white px-6 py-2.5 rounded-lg hover:bg-green-700 font-medium shadow-sm transition-colors h-[46px]">
                        Add Category
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 bg-gray-50/50">
            <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                <span class="bg-blue-100 text-blue-600 w-8 h-8 rounded-full flex items-center justify-center text-sm">2</span>
                Add New Product
            </h2>
        </div>

        <div class="p-6">
            <form id="prodForm" class="grid gap-6">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                        <input id="pName" type="text" placeholder="e.g. Luxury Rose Bouquet" required
                               class="w-full border border-gray-300 px-4 py-2.5 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                        <select id="pCat" required class="w-full border border-gray-300 px-4 py-2.5 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none bg-white transition-all">
                            <option value="" disabled selected>Loading categories...</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea id="pDesc" placeholder="Describe the flowers..." rows="3"
                              class="w-full border border-gray-300 px-4 py-2.5 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Price (CZK)</label>
                        <div class="relative">
                            <input id="pPrice" type="number" step="0.01" placeholder="0.00" required
                                   class="w-full border border-gray-300 px-4 py-2.5 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all">
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                <span class="text-gray-500 text-sm">CZK</span>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">In Stock</label>
                        <input id="pStock" type="number" placeholder="Qty" required
                               class="w-full border border-gray-300 px-4 py-2.5 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all">
                    </div>
                </div>

                <button type="submit" class="w-full bg-green-600 text-white px-4 py-3 rounded-lg font-bold hover:bg-green-700 shadow-md transition-all mt-2 text-lg">
                    Create Product
                </button>
            </form>
        </div>
    </div>
</main>

<script>
    // --- JS ЛОГИКА ОСТАЛАСЬ ТАКОЙ ЖЕ, КАК БЫЛА РАБОЧЕЙ ---

    function loadCategories() {
        fetch('/api/categories')
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById('pCat');
                select.innerHTML = '<option value="" disabled selected>Select Category...</option>';
                data.forEach(c => {
                    select.innerHTML += `<option value="${c.categoryId}">${c.name}</option>`;
                });
            })
            .catch(err => console.error("Error loading categories:", err));
    }

    document.getElementById('catForm').onsubmit = async (e) => {
        e.preventDefault();
        const name = document.getElementById('catName').value;
        const res = await fetch('/api/categories', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: name })
        });
        if(res.ok) {
            alert('Category added successfully!');
            document.getElementById('catName').value = '';
            loadCategories();
        } else alert('Error adding category');
    };

    document.getElementById('prodForm').onsubmit = async (e) => {
        e.preventDefault();
        const product = {
            name: document.getElementById('pName').value,
            description: document.getElementById('pDesc').value,
            price: document.getElementById('pPrice').value,
            inStock: document.getElementById('pStock').value,
            availability: true,
            category: { categoryId: document.getElementById('pCat').value }
        };
        const res = await fetch('/api/products', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(product)
        });
        if(res.ok) {
            alert('Product created successfully!');
            document.getElementById('prodForm').reset();
        } else alert('Error adding product');
    };

    loadCategories();
</script>
</body>
</html>
